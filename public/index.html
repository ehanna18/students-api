<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h2 class="text-center">Students Management</h2>
        </div>

        <div id="messageBox"></div>

        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-2">
                    <input type="number" id="studentId" class="form-control" placeholder="ID">
                </div>

                <div class="col-md-3">
                    <input type="text" id="studentName" class="form-control" placeholder="Name">
                </div>

                <div class="col-md-2">
                    <select id="studentGrade" class="form-control">
                        <option value="">Grade</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="F">F</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="studentPhoto" class="form-control">
                        <option value="">Photo</option>
                        <option value="person.jpg">person.jpg</option>
                        <option value="person2.jpeg">person2.jpeg</option>
                        <option value="person3.jpeg">person3.jpeg</option>
                        <option value="person4.jpeg">person4.jpeg</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-success w-100" onclick="addStudent()">Add</button>
                </div>
            </div>

            <table class="table table-bordered table-hover table-striped text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Photo</th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Grade</th>
                        <th width="250">Action</th>
                    </tr>
                </thead>
                <tbody id="studentsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="updateModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-warning">
                <h5 class="modal-title">Update Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="oldStudentId">

                <label class="form-label">Student ID</label>
                <input type="number" id="updateStudentId" class="form-control mb-3">

                <label class="form-label">Student Name</label>
                <input type="text" id="updateStudentName" class="form-control mb-3">

                <label class="form-label">Grade</label>
                <select id="updateStudentGrade" class="form-control mb-3">
                    <option value="">Select Grade</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="F">F</option>
                </select>

                <label class="form-label">Photo</label>
                <select id="updateStudentPhoto" class="form-control">
                    <option value="">Select Photo</option>
                    <option value="person.jpg">person.jpg</option>
                    <option value="person2.jpeg">person2.jpeg</option>
                    <option value="person3.jpeg">person3.jpeg</option>
                    <option value="person4.jpeg">person4.jpeg</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-warning" onclick="updateStudent()">Update</button>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Delete Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Are you sure you want to delete this student?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>

        </div>
    </div>
</div>

<script>
let deleteId = null;

loadStudents();

function showMessage(message, type) {
    const box = document.getElementById("messageBox");

    box.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show m-3">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;

    setTimeout(() => {
        box.innerHTML = "";
    }, 3000);
}

function getImageSrc(photo) {
    if (!photo) {
        return "/images/person4.jpeg";
    }

    return "/images/" + photo;
}

function loadStudents() {
    fetch("/students")
        .then(response => response.json())
        .then(students => {
            const table = document.getElementById("studentsTable");
            table.innerHTML = "";

            students.forEach(student => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>
                        <img src="${getImageSrc(student.photo)}"
                             width="60"
                             height="60"
                             class="rounded-circle"
                             style="object-fit: cover;">
                    </td>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.grade}</td>
                    <td>
                        <button class="btn btn-warning btn-sm me-2 edit-btn">Edit</button>
                        <button class="btn btn-danger btn-sm delete-btn">Delete</button>
                    </td>
                `;

                row.querySelector(".edit-btn").addEventListener("click", function () {
                    openUpdateModal(student.id, student.name, student.grade, student.photo);
                });

                row.querySelector(".delete-btn").addEventListener("click", function () {
                    openDeleteModal(student.id);
                });

                table.appendChild(row);
            });
        })
        .catch(error => {
            console.log(error);
            showMessage("Error loading students.", "danger");
        });
}

function addStudent() {
    const id = document.getElementById("studentId").value;
    const name = document.getElementById("studentName").value;
    const grade = document.getElementById("studentGrade").value;
    const photo = document.getElementById("studentPhoto").value;

    if (id === "" || name === "" || grade === "" || photo === "") {
        showMessage("Please fill all fields.", "danger");
        return;
    }

    fetch("/students", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            name: name,
            grade: grade,
            photo: photo
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("studentId").value = "";
        document.getElementById("studentName").value = "";
        document.getElementById("studentGrade").value = "";
        document.getElementById("studentPhoto").value = "";

        loadStudents();
        showMessage(data.message, "success");
    })
    .catch(error => {
        console.log(error);
        showMessage("Error adding student.", "danger");
    });
}

function openUpdateModal(id, name, grade, photo) {
    document.getElementById("oldStudentId").value = id;
    document.getElementById("updateStudentId").value = id;
    document.getElementById("updateStudentName").value = name;
    document.getElementById("updateStudentGrade").value = grade;
    document.getElementById("updateStudentPhoto").value = photo;

    const modal = new bootstrap.Modal(document.getElementById("updateModal"));
    modal.show();
}

function updateStudent() {
    const oldId = document.getElementById("oldStudentId").value;
    const newId = document.getElementById("updateStudentId").value;
    const name = document.getElementById("updateStudentName").value;
    const grade = document.getElementById("updateStudentGrade").value;
    const photo = document.getElementById("updateStudentPhoto").value;

    if (newId === "" || name === "" || grade === "" || photo === "") {
        showMessage("Please fill all fields.", "danger");
        return;
    }

    fetch(`/students/${oldId}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: newId,
            name: name,
            grade: grade,
            photo: photo
        })
    })
    .then(response => response.json())
    .then(data => {
        loadStudents();

        const modal = bootstrap.Modal.getInstance(document.getElementById("updateModal"));
        modal.hide();

        showMessage(data.message, "warning");
    })
    .catch(error => {
        console.log(error);
        showMessage("Error updating student.", "danger");
    });
}

function openDeleteModal(id) {
    deleteId = id;

    const modal = new bootstrap.Modal(document.getElementById("deleteModal"));
    modal.show();
}

document.getElementById("confirmDeleteBtn").addEventListener("click", function () {
    fetch(`/students/${deleteId}`, {
        method: "DELETE"
    })
    .then(response => response.json())
    .then(data => {
        loadStudents();

        const modal = bootstrap.Modal.getInstance(document.getElementById("deleteModal"));
        modal.hide();

        showMessage(data.message, "success");
    })
    .catch(error => {
        console.log(error);
        showMessage("Error deleting student.", "danger");
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
